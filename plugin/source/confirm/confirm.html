<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>UPORTAL unavailable</title>
  <link rel="stylesheet" href="confirm.css">
</head>
<body>
  <main>
    <h1 id="heading">UPORTAL unavailable</h1>
    <p id="bodyText">The server did not respond or returned an error. Tracking links and pixel cannot be created right now.</p>
    <pre id="error"></pre>
    <div class="actions">
      <button id="sendPlain" type="button">Send without UPORTAL links</button>
      <button id="saveDraft" type="button">Save to drafts</button>
    </div>
    <p id="hintText" class="hint">If you choose draft, sending will be canceled. The email will stay in the compose window; the extension will also try to save it as Draft.</p>
  </main>
  <script src="../captions.js"></script>
  <script src="confirm.js"></script>
</body>
</html>
