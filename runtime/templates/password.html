<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{TITLE}}</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f6f7f9;color:#222}
    .wrap{max-width:460px;margin:8vh auto;padding:24px}
    .card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{margin:0 0 10px;font-size:24px}
    p{margin:0 0 14px;line-height:1.45}
    .hint{font-size:14px;color:#666;margin-bottom:14px}
    input{width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #cfd5dc;border-radius:12px;font-size:16px}
    button{margin-top:12px;width:100%;padding:12px 14px;border:0;border-radius:12px;background:#111;color:#fff;font-size:16px;cursor:pointer}
    .err{margin-top:12px;color:#b00020;min-height:20px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>{{TITLE}}</h1>
      <p>{{DESCRIPTION}}</p>
      <div class="hint" id="hint">{{PASSWORD_HINT_LABEL}}: {{PASSWORD_HINT}}</div>

      <form id="pwf">
        <input id="pw" name="password" type="password" placeholder="{{PASSWORD_PLACEHOLDER}}" autocomplete="current-password"/>
        <button type="submit">{{CONTINUE}}</button>
      </form>

      <div class="err" id="err"></div>
    </div>
  </div>

  <script>
    (function () {
      var hintEl = document.getElementById('hint');
      if (!('{{PASSWORD_HINT}}')) {
        hintEl.style.display = 'none';
      }

      document.getElementById('pwf').addEventListener('submit', async function (e) {
        e.preventDefault();

        var err = document.getElementById('err');
        err.textContent = '';

        var pw = document.getElementById('pw').value || '';

        try {
          var res = await fetch('{{AUTH_URL}}', {
            method: 'POST',
            headers: {'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},
            body: 'password=' + encodeURIComponent(pw),
            credentials: 'same-origin'
          });

          var data = await res.json().catch(function(){ return {}; });

          if (!res.ok || !data.ok) {
            err.textContent = data && data.error ? data.error : '{{INVALID_PASSWORD}}';
            return;
          }

          location.href = data.redirect_to || '{{REDIRECT_TO}}';
        } catch (e2) {
          err.textContent = '{{PASSWORD_CHECK_ERROR}}';
        }
      });
    })();
  </script>
</body>
</html>
