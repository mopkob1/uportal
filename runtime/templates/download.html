<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{TITLE}}</title>
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="{{TITLE}}"/>
  <meta property="og:description" content="{{DESCRIPTION}}"/>
  <meta property="og:image" content="{{IMAGE}}"/>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:24px;background:#f7f7f8;color:#111}
    .wrap{position:relative;max-width:760px;margin:0 auto;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:24px}
    .brand-logo{position:absolute;top:18px;right:20px;display:block}
    .brand-logo svg{display:block;width:128px;height:auto}
    h1{padding-right:150px}
    .muted{opacity:.75}
    .powered{margin-top:28px;padding-top:18px;border-top:1px solid #e5e7eb;font-size:14px;color:#4b5563}
    .powered a{color:#2563eb;text-decoration:none;font-weight:700}
    .powered a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="brand-logo" href="{{UPORTAL_GITHUB_URL}}" target="_blank" rel="noopener noreferrer" aria-label="UPORTAL">{{UPORTAL_LOGO_SVG}}</a>
    <h1>{{TITLE}}</h1>
    <p class="muted">{{DESCRIPTION}}</p>
    <p>{{FILE_LABEL}}: <b>{{FILE_NAME}}</b></p>
    <p>{{DOWNLOAD_STARTS_IN}} <b id="sec">{{DELAY}}</b> {{SECONDS_LABEL}}</p>
    <div class="powered">
      {{POWERED_BY_PREFIX}} <a href="{{UPORTAL_GITHUB_URL}}" target="_blank" rel="noopener noreferrer">UPORTAL</a>.
      {{POWERED_BY_CTA_PREFIX}} <a href="{{UPORTAL_GITHUB_URL}}" target="_blank" rel="noopener noreferrer">{{POWERED_BY_CTA_LINK}}</a>
    </div>
  </div>

  <script>
    const PUB = "{{PUBLICATION_ID}}";
    const TOKEN = "{{TOKEN}}";
    const OPEN_URL = {{OPEN_URL_JS}};
    const DOWNLOAD_URL = {{DOWNLOAD_URL_JS}};
    let s = parseInt("{{DELAY}}", 10) || 0;

    async function ping(url) {
      if (!url) return;
      try {
        await fetch(url, {
          method: 'POST',
          credentials: 'same-origin',
          cache: 'no-store'
        });
      } catch {}
    }

    async function getSigned() {
      const r = await fetch(`/api/sign/${PUB}/${TOKEN}`, {
        credentials: 'same-origin',
        cache: 'no-store'
      });
      if (!r.ok) throw new Error('sign failed');
      return await r.json();
    }

    async function startDownload() {
      ping(DOWNLOAD_URL);
      const { e, st, file, filename } = await getSigned();
      const nice = encodeURIComponent(filename || file || TOKEN);
      window.location.href = `/f/${PUB}/${TOKEN}/${encodeURIComponent(file)}?e=${encodeURIComponent(e)}&st=${encodeURIComponent(st)}&fn=${nice}`;
    }

    (async () => {
      await ping(OPEN_URL);

      const el = document.getElementById('sec');
      el.textContent = String(s);

      if (s === 0) {
        await startDownload();
        return;
      }

      const t = setInterval(async () => {
        s -= 1;
        el.textContent = String(Math.max(s, 0));
        if (s <= 0) {
          clearInterval(t);
          await startDownload();
        }
      }, 1000);
    })();
  </script>
</body>
</html>
