add_header Access-Control-Allow-Origin $uportal_cors_origin always;
add_header Access-Control-Allow-Credentials true always;
add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
add_header Access-Control-Allow-Headers "Content-Type, X-User-Token, X-Admin-Key, X-Upload-Key, X-UPortal-Client-Uid, X-UPortal-Client-Type, X-Requested-With" always;

if ($request_method = OPTIONS) {
    return 204;
}
