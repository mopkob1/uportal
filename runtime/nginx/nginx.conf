user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

http {

	js_import landing from /etc/nginx/njs/landing.js;
	js_import signer  from /etc/nginx/njs/signer.js;
	js_import metajs  from /etc/nginx/njs/meta.js;
	js_import track from /etc/nginx/njs/track.js;

        js_import portal from /etc/nginx/njs/portal.js;

        log_format uportal_pixel_json escape=json
        '{'
        '"ts":"$time_iso8601",'
        '"event":"pixel",'
        '"publication":"$uportal_track_pub",'
        '"token":"$uportal_track_token",'
        '"uri":"$request_uri",'
        '"ip":"$remote_addr",'
        '"xff":"$proxy_add_x_forwarded_for",'
        '"scheme":"$scheme",'
        '"host":"$host",'
        '"referer":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"accept_language":"$http_accept_language",'
        '"cookie_uid":"$cookie_uportal_uid",'
        '"cookie_page":"$cookie_uportal_page",'
        '"cookie_pw":"$cookie_uportal_pw"'
        '}';

	log_format track_main
        '$time_iso8601\t'
        '$remote_addr\t'
        '$request_method\t'
        '$request_uri\t'
        '$status\t'
        '$body_bytes_sent\t'
        '$http_user_agent\t'
        '$http_referer\t'
        '$http_accept_language';

	map $http_upgrade $connection_upgrade {
	  default upgrade;
	  ''      close;
	}

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;

	##
	# Gzip Settings
	##

	gzip on;

	# gzip_vary on;
	# gzip_proxied any;
	# gzip_comp_level 6;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}


