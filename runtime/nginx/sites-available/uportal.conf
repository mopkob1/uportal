server {
    listen 443 ssl http2;
    server_name __UPORTAL_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/__UPORTAL_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__UPORTAL_DOMAIN__/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/__UPORTAL_DOMAIN__/chain.pem;

    access_log /var/log/nginx/uportal_access.log;
    error_log  /var/log/nginx/uportal_error.log warn;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    location ^~ /link-fallback {
	include /etc/nginx/snippets/uportal-cors.conf;
        js_content portal.fallback;
    }

    location ~ "^/s/[A-Za-z0-9]{9}$" {
	include /etc/nginx/snippets/uportal-cors.conf;
        add_header Cache-Control "no-store" always;
        js_content portal.dispatchShort;
    }

    location ~ "^/api/auth/([^/]+)/([^/]+)$" {
	include /etc/nginx/snippets/uportal-cors.conf;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        js_content portal.authPassword;
    }

    location ~ "^/o/([^/]+)/([^/]+)\.(gif|png)$" {
	include /etc/nginx/snippets/uportal-cors.conf;
	js_content portal.pixelGate;
    }

    location ~ "^/api/track/([a-z_]+)/([^/]+)/([^/]+)$" {
	include /etc/nginx/snippets/uportal-cors.conf;
        secure_link $arg_md5,$arg_e;
        secure_link_md5 "$secure_link_expires$uri$uportal_stat_secret";

        if ($secure_link = "") { return 403; }
        if ($secure_link = "0") { return 410; }

	        set $track_event $1;
	        set $track_pub $2;
	        set $track_token $3;
	        set $uportal_original_uri $request_uri;

        mirror /__uportal_track_n8n_from_api;
        # CE: Telegram notification mirror is intentionally retained as a disabled
        # hook point. uportal-track-event.sh starts Telegram notify asynchronously
        # after local event persistence, so enabling this mirror would duplicate it.
        # mirror /__uportal_notify_telegram_from_api;
        mirror_request_body off;

	proxy_pass http://127.0.0.1:8080/track/event?event=$track_event&publication=$track_pub&token=$track_token&uid=$cookie_uportal_uid&original_uri=$uportal_original_uri&ip=$uportal_client_ip&xff=$uportal_client_xff&proto=$uportal_client_proto&host=$uportal_client_host&ua=&referer=&accept_language=&ua_b64=$uportal_header_ua_b64&referer_b64=$uportal_header_referer_b64&accept_language_b64=$uportal_header_accept_language_b64;

        proxy_set_header X-Token $uportal_admin_secret;
        proxy_set_header X-Real-IP $uportal_client_ip;
        proxy_set_header X-Forwarded-For $uportal_client_xff;
        proxy_set_header X-Forwarded-Proto $uportal_client_proto;
        proxy_set_header X-Forwarded-Host $uportal_client_host;
        proxy_set_header X-Original-URI $uportal_original_uri;
    }

    location ~ "^/api/sign/([^/]+)/([^/]+)$" {
	include /etc/nginx/snippets/uportal-cors.conf;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        js_content portal.signDownload;
    }

    location ~ "^/f/([^/]+)/([^/]+)/([A-Za-z0-9._-]{1,200})$" {
	include /etc/nginx/snippets/uportal-cors.conf;
        secure_link $arg_st,$arg_e;
        secure_link_md5 "$arg_e$uri $uportal_dl_salt";

        if ($secure_link = "") { return 403; }
        if ($secure_link = "0") { return 410; }

	        set $track_event "download";
	        set $track_pub $1;
	        set $track_token $2;
	        set $uportal_original_uri $request_uri;

	mirror /__uportal_track_shhoook;
	mirror /__uportal_track_n8n;
	# CE: retained disabled Telegram mirror; event script starts it async.
	# mirror /__uportal_notify_telegram;
	mirror_request_body off;

        add_header Cache-Control "no-store" always;
	js_content portal.sendFile;
    }

    location ~ "^/p/([^/]+)/([^/]+)/$" {
	include /etc/nginx/snippets/uportal-cors.conf;
	        set $track_event "page_view";
	        set $track_pub $1;
	        set $track_token $2;
	        set $uportal_original_uri $request_uri;

	mirror /__uportal_track_shhoook;
	mirror /__uportal_track_n8n;
	# CE: retained disabled Telegram mirror; event script starts it async.
	# mirror /__uportal_notify_telegram;
	mirror_request_body off;

        add_header Cache-Control "no-store" always;
	js_content portal.pageShell;
    }

    location ~ "^/api/page-content/([^/]+)/([^/]+)$" {
        include /etc/nginx/snippets/uportal-cors.conf;
	        set $track_event "content";
	        set $track_pub $1;
		set $track_token $2;
	        set $uportal_original_uri $request_uri;

	mirror /__uportal_track_shhoook;
	mirror /__uportal_track_n8n;
	# CE: retained disabled Telegram mirror; event script starts it async.
	# mirror /__uportal_notify_telegram;
	mirror_request_body off;

        add_header Cache-Control "no-store" always;
	js_content portal.pageContent;
    }


    location ~ "^/assets/([^/]+)/([^/]+)/(.+)$" {
	include /etc/nginx/snippets/uportal-cors.conf;
        add_header Cache-Control "no-store" always;
        js_content portal.pageAsset;
    }

    location ~ "^/assets-public/([^/]+)/([^/]+)/([^/]+)$" {
	include /etc/nginx/snippets/uportal-cors.conf;
        js_content portal.publicAsset;
    }

    location ~ "^/_uportal_page_asset/([^/]+)/([^/]+)/(.+)$" {
        internal;
        alias /data/files/uportal/storage/$1/$2/page/$3;
	include /etc/nginx/snippets/uportal-cors.conf;
        add_header Cache-Control "no-store" always;
        add_header Accept-Ranges bytes always;
    }

    location ~ "^/_uportal_file/([^/]+)/([^/]+)/([A-Za-z0-9._-]{1,200})$" {
        internal;
        alias /data/files/uportal/storage/$1/$2/payload/$3;
        add_header Content-Disposition "$uportal_content_disposition" always;
        add_header Cache-Control "no-store" always;
    }

    location = /shell.tailwind.css {
	include /etc/nginx/snippets/uportal-cors.conf;
        alias /data/files/uportal/templates/shell.tailwind.css;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /md.css {
	include /etc/nginx/snippets/uportal-cors.conf;
        alias /data/files/uportal/templates/md.css;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /uportal-logo.svg {
	include /etc/nginx/snippets/uportal-cors.conf;
        alias /data/files/uportal/templates/uportal-logo.svg;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /uportal-og-cover.png {
	include /etc/nginx/snippets/uportal-cors.conf;
        alias /data/files/uportal/templates/uportal-og-cover.png;
        add_header Cache-Control "public, max-age=3600" always;
    }

    client_max_body_size 500m;
    create_full_put_path on;

    location ~ "^/upload/([^/]+)/([^/]+)/([^/]+)$" {
	include /etc/nginx/snippets/uportal-cors.conf;
	if ($request_method = OPTIONS) {
	    return 204;
	}

        client_body_temp_path /data/files/upload-temp 1 2;
        auth_request /_auth_uportal_upload;

        root /data;
        dav_methods PUT DELETE MKCOL;
        dav_access user:rw group:rw all:r;

        rewrite ^/upload/([^/]+)/([^/]+)/([^/]+)$ $uportal_upload_root/$1/$2/$3 break;

        add_header Cache-Control "no-store" always;
    }

    location = /_auth_uportal_admin_key {
        internal;

	if ($uportal_admin_key_valid = 1) {
    	    return 204;
        }

	return 403;
    }

    location = /_auth_uportal_admin {
        internal;

        if ($uportal_admin_key_valid = 1) {
            return 204;
        }

        if ($uportal_safe_user_token = "") {
            return 403;
        }

        root /;
        try_files $uportal_user_token_enabled_root/$uportal_safe_user_token.json =403;
    }

    location = /_auth_uportal_upload {
        internal;

        if ($uportal_upload_key_valid = 1) {
            return 204;
        }

        root /data/files/uportal/upload-grants;
        try_files /$uportal_safe_upload_grant @_auth_uportal_upload_token;
    }

    location @_auth_uportal_upload_token {
        internal;

        if ($uportal_safe_user_token = "") {
            return 403;
        }

        root /;
        try_files $uportal_user_token_enabled_root/$uportal_safe_user_token.json =403;
    }

    location = /api/admin/tokens {
	include /etc/nginx/snippets/uportal-cors.conf;
	if ($request_method = OPTIONS) {
	    return 204;
	}

        auth_request /_auth_uportal_admin_key;
        add_header Cache-Control "no-store" always;

        proxy_pass http://127.0.0.1:8080/tokens;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

	proxy_set_header X-Token $uportal_admin_secret;
    }

    location = /api/admin/dictionary {
	include /etc/nginx/snippets/uportal-cors.conf;
        auth_request /_auth_uportal_admin;
        add_header Cache-Control "no-store" always;

	rewrite ^/api/admin/dictionary$ /_admin_user/dictionary last;
    }

    location /api/admin/ {
	include /etc/nginx/snippets/uportal-cors.conf;
	if ($request_method = OPTIONS) {
	    return 204;
	}
	limit_except GET POST DELETE PUT OPTIONS { deny all; }
        auth_request /_auth_uportal_admin;
        add_header Cache-Control "no-store" always;

        if ($uportal_safe_user_token != "") {
            rewrite ^/api/admin/(.*)$ /_admin_user/$1 last;
        }

        proxy_pass http://127.0.0.1:8080/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Token $http_x_admin_key;
    }



    location /_admin_user/ {
        internal;
	include /etc/nginx/snippets/uportal-cors.conf;
        auth_request /_auth_uportal_admin;
        rewrite ^/_admin_user/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8080$uri?$uportal_args_with_user_token;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Token $uportal_admin_secret;

        add_header Cache-Control "no-store" always;
    }

    location /__uportal_track_shhoook {
        internal;

        proxy_pass http://127.0.0.1:8080/track/event?event=$uportal_track_event&publication=$uportal_track_pub&token=$uportal_track_token&uid=$cookie_uportal_uid&original_uri=$uportal_original_uri&ip=$uportal_client_ip&xff=$uportal_client_xff&proto=$uportal_client_proto&host=$uportal_client_host&ua=&referer=&accept_language=&ua_b64=$uportal_header_ua_b64&referer_b64=$uportal_header_referer_b64&accept_language_b64=$uportal_header_accept_language_b64;
	proxy_set_header X-Token $uportal_admin_secret;
        proxy_set_header X-Real-IP $uportal_client_ip;
	proxy_set_header X-Forwarded-For $uportal_client_xff;
        proxy_set_header X-Forwarded-Proto $uportal_client_proto;
        proxy_set_header X-Forwarded-Host $uportal_client_host;
        proxy_set_header X-Original-URI $uportal_original_uri;
    }

    location /__uportal_track_n8n {
	internal;

        proxy_pass $uportal_webhook_base$uportal_track_webhook?event=$uportal_track_event&publication=$uportal_track_pub&token=$uportal_track_token&uid=$cookie_uportal_uid&original_uri=$uportal_original_uri&ip=$uportal_client_ip&xff=$uportal_client_xff&proto=$uportal_client_proto&host=$uportal_client_host;

        proxy_set_header Host $uportal_client_host;
        proxy_set_header X-Real-IP $uportal_client_ip;
	proxy_set_header X-Forwarded-For $uportal_client_xff;
        proxy_set_header X-Forwarded-Proto $uportal_client_proto;
        proxy_set_header X-Forwarded-Host $uportal_client_host;
        proxy_set_header X-Original-URI $uportal_original_uri;

	proxy_set_header X-Track-Internal-Key $uportal_internal_key;
    }

    location /__uportal_track_n8n_from_api {
        internal;


	proxy_pass $uportal_webhook_base$uportal_track_webhook?event=$track_event&publication=$track_pub&token=$track_token&uid=$cookie_uportal_uid&original_uri=$uportal_original_uri&ip=$uportal_client_ip&xff=$uportal_client_xff&proto=$uportal_client_proto&host=$uportal_client_host;

        proxy_set_header Host $uportal_client_host;
        proxy_set_header X-Real-IP $uportal_client_ip;
	proxy_set_header X-Forwarded-For $uportal_client_xff;
        proxy_set_header X-Forwarded-Proto $uportal_client_proto;
        proxy_set_header X-Forwarded-Host $uportal_client_host;
        proxy_set_header X-Original-URI $uportal_original_uri;

	proxy_set_header X-Track-Internal-Key $uportal_internal_key;
    }

    # CE: retained disabled Telegram mirror endpoints. The active CE path is:
    # nginx mirror -> /track/event -> uportal-track-event.sh -> async
    # uportal-telegram-notify-event.sh. Uncommenting these locations and the
    # mirror directives above restores the old nginx mirror wiring.
