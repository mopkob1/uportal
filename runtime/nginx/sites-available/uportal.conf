    # location /__uportal_notify_telegram {
    #     internal;
    #
    #     proxy_pass http://127.0.0.1:8080/notify/telegram-event?event=$uportal_track_event&publication=$uportal_track_pub&token=$uportal_track_token&uid=$cookie_uportal_uid&original_uri=$uportal_original_uri&ip=$uportal_client_ip&xff=$uportal_client_xff&proto=$uportal_client_proto&host=$uportal_client_host&ua=&referer=&accept_language=&ua_b64=$uportal_header_ua_b64&referer_b64=$uportal_header_referer_b64&accept_language_b64=$uportal_header_accept_language_b64;
    #     proxy_set_header X-Token $uportal_admin_secret;
    #     proxy_set_header X-Real-IP $uportal_client_ip;
    #     proxy_set_header X-Forwarded-For $uportal_client_xff;
    #     proxy_set_header X-Forwarded-Proto $uportal_client_proto;
    #     proxy_set_header X-Forwarded-Host $uportal_client_host;
    #     proxy_set_header X-Original-URI $uportal_original_uri;
    # }
    #
    # location /__uportal_notify_telegram_from_api {
    #     internal;
    #
    #     proxy_pass http://127.0.0.1:8080/notify/telegram-event?event=$track_event&publication=$track_pub&token=$track_token&uid=$cookie_uportal_uid&original_uri=$uportal_original_uri&ip=$uportal_client_ip&xff=$uportal_client_xff&proto=$uportal_client_proto&host=$uportal_client_host&ua=&referer=&accept_language=&ua_b64=$uportal_header_ua_b64&referer_b64=$uportal_header_referer_b64&accept_language_b64=$uportal_header_accept_language_b64;
    #     proxy_set_header X-Token $uportal_admin_secret;
    #     proxy_set_header X-Real-IP $uportal_client_ip;
    #     proxy_set_header X-Forwarded-For $uportal_client_xff;
    #     proxy_set_header X-Forwarded-Proto $uportal_client_proto;
    #     proxy_set_header X-Forwarded-Host $uportal_client_host;
    #     proxy_set_header X-Original-URI $uportal_original_uri;
    # }

location = /__uportal_track_pixel_shhoook {
    internal;

    proxy_pass http://127.0.0.1:8080/track/event?event=$arg_event&publication=$arg_publication&token=$arg_token&uid=$arg_uid&original_uri=$arg_original_uri&ip=$arg_ip&xff=$arg_xff&proto=$arg_proto&host=$arg_host&ua=$arg_ua&referer=$arg_referer&accept_language=$arg_accept_language;

    proxy_set_header X-Token $uportal_admin_secret;
    proxy_set_header X-Real-IP $arg_ip;
    proxy_set_header X-Forwarded-For $arg_xff;
    proxy_set_header X-Forwarded-Proto $arg_proto;
    proxy_set_header X-Forwarded-Host $arg_host;
    proxy_set_header X-Original-URI $arg_original_uri;
}

location = /__uportal_track_pixel_n8n {
    internal;

    proxy_pass $uportal_webhook_base$uportal_track_webhook?event=$arg_event&publication=$arg_publication&token=$arg_token&uid=$arg_uid&original_uri=$arg_original_uri&ip=$arg_ip&xff=$arg_xff&proto=$arg_proto&host=$arg_host;

    proxy_set_header Host $arg_host;
    proxy_set_header X-Real-IP $arg_ip;
    proxy_set_header X-Forwarded-For $arg_xff;
    proxy_set_header X-Forwarded-Proto $arg_proto;
    proxy_set_header X-Forwarded-Host $arg_host;
    proxy_set_header X-Original-URI $arg_original_uri;
    proxy_set_header X-Track-Internal-Key $uportal_internal_key;
}

