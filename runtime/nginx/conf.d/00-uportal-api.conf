# CORS origin whitelist for UPORTAL admin/plugin clients.
# Core upload/admin variables are defined in 00-uportal.conf.
map $http_origin $uportal_cors_origin {
    default "";
    "~^http://localhost:5173$" $http_origin;
    "~^http://127\.0\.0\.1:5173$" $http_origin;
    "~^__UPORTAL_BASE_URL_REGEX__$" $http_origin;
}
