# /etc/nginx/conf.d/00-uportal.conf
# Shared UPORTAL nginx+njs runtime variables for upload/admin API,
# secure links and event tracking.
#
# Secrets and server-side tokens are stored in:
# /etc/nginx/conf.d/00-uportal-secrets.conf

# -----------------------------------------------------------------------------
# 1. Main UPORTAL directories
# -----------------------------------------------------------------------------

map "" $uportal_root {
    default "/data/files/uportal";
}

map "" $uportal_meta_root {
    default "/data/files/uportal/meta";
}

map "" $uportal_short_root {
    default "/data/files/uportal/short";
}

map "" $uportal_storage_root {
    default "/data/files/uportal/storage";
}

map "" $uportal_template_root {
    default "/data/files/uportal/templates";
}

map "" $uportal_pixel_path {
    default "/data/files/uportal/pixel/1x1.gif";
}

# -----------------------------------------------------------------------------
# 2. Base URLs
# -----------------------------------------------------------------------------

map "" $uportal_base_url {
    default "__UPORTAL_BASE_URL__";
}

map "" $uportal_fallback_url {
    default "__UPORTAL_BASE_URL__/link-fallback";
}

# -----------------------------------------------------------------------------
# 3. Webhook / track integration
# -----------------------------------------------------------------------------

# Shared webhook for all events
map "" $uportal_track_webhook {
    default "/webhook/track-event";
}

# Resolve event type by URI for nginx mirror events.
# JS events /api/track/<event>/<pub>/<token> take event from the regex location.
map $request_uri $uportal_track_event {
    default "";
    ~^/p/([^/]+)/([^/]+)/ page_view;
    ~^/api/page-content/([^/]+)/([^/?]+) content;
    ~^/o/([^/]+)/([^/.]+)\.(gif|png) pixel;
    ~^/_pixel_static/([^/]+)/([^/.]+)\.(gif|png) pixel;
    ~^/f/([^/]+)/([^/]+)/([A-Za-z0-9._-]+) download;
}

map $request_uri $uportal_track_pub {
    default "";
    ~^/p/([^/]+)/([^/]+)/ $1;
    ~^/api/page-content/([^/]+)/([^/?]+) $1;
    ~^/o/([^/]+)/([^/.]+)\.(gif|png) $1;
    ~^/_pixel_static/([^/]+)/([^/.]+)\.(gif|png) $1;
    ~^/f/([^/]+)/([^/]+)/([A-Za-z0-9._-]+) $1;
}

map $request_uri $uportal_track_token {
    default "";
    ~^/p/([^/]+)/([^/]+)/ $2;
    ~^/api/page-content/([^/]+)/([^/?]+) $2;
    ~^/o/([^/]+)/([^/.]+)\.(gif|png) $2;
    ~^/_pixel_static/([^/]+)/([^/.]+)\.(gif|png) $2;
    ~^/f/([^/]+)/([^/]+)/([A-Za-z0-9._-]+) $2;
}

map $http_x_real_ip $uportal_client_ip {
    default $http_x_real_ip;
    "" $remote_addr;
}

map $http_x_forwarded_for $uportal_client_xff {
    default $http_x_forwarded_for;
    "" $remote_addr;
}

map $http_x_forwarded_proto $uportal_client_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_host $uportal_client_host {
    default $http_x_forwarded_host;
    "" $host;
}

js_set $uportal_header_ua_b64 portal.userAgentB64;
js_set $uportal_header_referer_b64 portal.refererB64;
js_set $uportal_header_accept_language_b64 portal.acceptLanguageB64;

# -----------------------------------------------------------------------------
# 4. Upload/admin API
# -----------------------------------------------------------------------------

map "" $uportal_upload_root {
    default "/files/inbox";
}

map "" $uportal_user_token_root {
    default "/data/files/uportal/user-tokens";
}

map "" $uportal_user_token_enabled_root {
    default "/data/files/uportal/user-tokens-enabled";
}

# Safe user token normalization from X-User-Token
map $http_x_user_token $uportal_safe_user_token {
    default "";
    "~^[A-Za-z0-9._-]{16,128}$" $http_x_user_token;
}

map $http_x_uportal_client_uid $uportal_safe_client_uid {
    default "";
    "~^[A-Za-z0-9._:-]{8,128}$" $http_x_uportal_client_uid;
}

map $http_x_uportal_client_type $uportal_safe_client_type {
    default "";
    "~^(web|plugin)$" $http_x_uportal_client_type;
}

# Admin/upload key is valid only when the header is non-empty and equals the
# configured secret. This prevents an empty header from matching an empty secret.
map "$http_x_admin_key:$uportal_admin_secret" $uportal_admin_key_valid {
    default 0;
    "~^([^:]+):\1$" 1;
}

map "$http_x_upload_key:$uportal_upload_secret" $uportal_upload_key_valid {
    default 0;
    "~^([^:]+):\1$" 1;
}

# Forward user_token to shhoook through query params
map $args $uportal_args_with_user_token {
    default "user_token=$uportal_safe_user_token&client_uid=$uportal_safe_client_uid&client_type=$uportal_safe_client_type";
    "~.+" "$args&user_token=$uportal_safe_user_token&client_uid=$uportal_safe_client_uid&client_type=$uportal_safe_client_type";
}

# -----------------------------------------------------------------------------
# 5. Helper nginx variables
# -----------------------------------------------------------------------------

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

# Safe filename for Content-Disposition (?fn=...)
map $arg_fn $uportal_content_disposition {
    default "attachment; filename=\"download.bin\"";
    "~^[A-Za-z0-9][A-Za-z0-9 _.,()\-]{0,199}$" "attachment; filename=\"$arg_fn\"";
    "~^(?:[A-Za-z0-9._~!*'()-]|%[0-9A-Fa-f]{2}){1,600}$" "attachment; filename=\"download.bin\"; filename*=UTF-8''$arg_fn";
}
