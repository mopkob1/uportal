# /etc/nginx/conf.d/00-uportal-secrets.conf
# UPORTAL secrets, tokens and server-specific integration values.
# In production this file must contain real values and must not be
# published as public configuration.

# -----------------------------------------------------------------------------
# 1. Runtime secrets
# -----------------------------------------------------------------------------

# Salt for secure_link downloads /f/...
map "" $uportal_dl_salt {
    default "CHANGE_ME_DOWNLOAD_SALT";
}

# Secret for signed stat/track URLs: /api/track/...
map "" $uportal_stat_secret {
    default "CHANGE_ME_STAT_SECRET";
}

# Secret for temporary page access cookie
map "" $uportal_page_secret {
    default "CHANGE_ME_PAGE_SECRET";
}

# -----------------------------------------------------------------------------
# 2. Admin/upload secrets
# -----------------------------------------------------------------------------

map "" $uportal_upload_secret {
    default "CHANGE_ME_UPORTAL_ADMIN_SECRET";
}

map "" $uportal_admin_secret {
    default "CHANGE_ME_UPORTAL_ADMIN_SECRET";
}

# -----------------------------------------------------------------------------
# 3. Webhook integration secrets
# -----------------------------------------------------------------------------

# Internal key for n8n/webhook
map "" $uportal_internal_key {
    default "CHANGE_ME_UPORTAL_INTERNAL_KEY";
}

# n8n base URL
map "" $uportal_webhook_base {
    default "http://CHANGE_ME_N8N_HOST:5673";
}
