services:
  uportal:
    build:
      context: ../..
      dockerfile: deploy/self-hosted-docker-compose/docker/uportal/Dockerfile
      args:
        UPORTAL_DOMAIN: ${UPORTAL_DOMAIN:?set UPORTAL_DOMAIN}
        UPORTAL_BASE_URL: ${UPORTAL_BASE_URL:-}
        UPORTAL_PLUGIN_DEFAULT_BASE_URL: ${UPORTAL_PLUGIN_DEFAULT_BASE_URL:-}
        UPORTAL_UI_LANG: ${UPORTAL_UI_LANG:-en}
    image: uportal:${UPORTAL_DOMAIN}
    restart: unless-stopped
    environment:
      UPORTAL_DOMAIN: ${UPORTAL_DOMAIN:?set UPORTAL_DOMAIN}
      UPORTAL_BASE_URL: ${UPORTAL_BASE_URL:-}
      UPORTAL_PUBLIC_BASE_URL: ${UPORTAL_PUBLIC_BASE_URL:-}
      UPORTAL_FALLBACK_URL: ${UPORTAL_FALLBACK_URL:-}
      UPORTAL_ADMIN_SECRET: ${UPORTAL_ADMIN_SECRET:-}
      UPORTAL_DOWNLOAD_SALT: ${UPORTAL_DOWNLOAD_SALT:-}
      UPORTAL_STAT_SECRET: ${UPORTAL_STAT_SECRET:-}
      UPORTAL_PAGE_SECRET: ${UPORTAL_PAGE_SECRET:-}
      UPORTAL_INTERNAL_KEY: ${UPORTAL_INTERNAL_KEY:-}
      UPORTAL_N8N_URL: ${UPORTAL_N8N_URL:-}
      UPORTAL_UI_LANG: ${UPORTAL_UI_LANG:-en}
      UPORTAL_COMMERCIAL_BRIDGE: ${UPORTAL_COMMERCIAL_BRIDGE:-}
      UPORTAL_COMMERCIAL_BRIDGE_URL: ${UPORTAL_COMMERCIAL_BRIDGE_URL:-}
      UPORTAL_COMMERCIAL_BRIDGE_TIMEOUT: ${UPORTAL_COMMERCIAL_BRIDGE_TIMEOUT:-}
    ports:
      - "${UPORTAL_BIND_ADDR:-127.0.0.1}:${UPORTAL_HTTP_PORT:-18080}:8080"
    volumes:
      - ${UPORTAL_DATA_DIR:-./data/files}:/data/files
      - ../../.git:/opt/uportal/git:ro
